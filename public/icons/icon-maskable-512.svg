<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="brain-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bolt-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Full bleed background - no rounded corners for maskable -->
  <rect width="512" height="512" fill="#0b0f19"/>

  <!-- Subtle radial glow -->
  <circle cx="256" cy="256" r="130" fill="#0ea5e9" opacity="0.06"/>

  <!-- All content within safe zone (circle r=204 centered at 256,256) -->
  <!-- Scaled down ~0.7x and centered compared to the regular icon -->

  <!-- Stylized brain outline - left hemisphere -->
  <path d="M216 178 C190 178, 160 202, 160 228 C160 246, 166 260, 180 270 C174 282, 174 296, 182 306 C190 318, 204 322, 218 318 C226 326, 240 328, 250 322 L250 256 L250 182 C240 176, 226 176, 216 178Z"
        fill="none" stroke="url(#brain-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Stylized brain outline - right hemisphere -->
  <path d="M296 178 C322 178, 352 202, 352 228 C352 246, 346 260, 332 270 C338 282, 338 296, 330 306 C322 318, 308 322, 294 318 C286 326, 272 328, 262 322 L262 256 L262 182 C272 176, 286 176, 296 178Z"
        fill="none" stroke="url(#brain-grad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Brain folds - left -->
  <path d="M182 214 C198 208, 218 214, 230 224" fill="none" stroke="url(#brain-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M170 252 C188 242, 210 248, 226 254" fill="none" stroke="url(#brain-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Brain folds - right -->
  <path d="M330 214 C314 208, 294 214, 282 224" fill="none" stroke="url(#brain-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M342 252 C324 242, 302 248, 286 254" fill="none" stroke="url(#brain-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Central lightning bolt -->
  <path d="M268 166 L240 252 L262 252 L236 340 L296 228 L270 228 Z"
        fill="url(#bolt-grad)" filter="url(#bolt-glow)" opacity="0.95"/>

  <!-- Highlight on bolt -->
  <path d="M268 166 L254 210 L268 210 Z" fill="#7dd3fc" opacity="0.45"/>
</svg>
